name: Release OKS

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Avoid Go toolchain auto-download races during parallel builds.
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create next semver tag (auto patch bump)
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest="$(
            git tag -l 'v*.*.*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1
          )"

          if [[ -z "${latest}" ]]; then
            latest="v0.0.0"
          fi

          ver="${latest#v}"
          IFS='.' read -r major minor patch <<< "${ver}"
          patch="$((patch + 1))"

          # In case the workflow is re-run or multiple pushes happen quickly,
          # keep bumping until we find a tag that doesn't exist.
          while : ; do
            tag="v${major}.${minor}.${patch}"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              patch="$((patch + 1))"
              continue
            fi
            break
          done

          echo "TAG=${tag}" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "refs/tags/${tag}"

      - name: Update moving 'latest' tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push --force origin "refs/tags/latest"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
